version: "3.9"

services:

  postgres:
    image: postgres:15-alpine
    container_name: library-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: library
      POSTGRES_PASSWORD: library123
      POSTGRES_DB: library_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: library-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  mailhog:
    image: mailhog/mailhog
    container_name: library-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI

  backend:
    build:
      context: .
    platform: linux/arm64
    container_name: library-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
      - mailhog
    env_file:
      - .env

  swagger-ui:
    image: swaggerapi/swagger-ui
    container_name: library-swagger
    ports:
      - "8081:8080"
    environment:
      SWAGGER_JSON: /docs/swagger.yaml
    volumes:
      - ./docs:/docs
    depends_on:
      - backend

volumes:
  postgres_data: