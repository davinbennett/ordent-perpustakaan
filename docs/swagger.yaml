openapi: 3.0.0
info:
  title: Library Management API
  version: 1.0.0
  description: Backend API for Library System using Golang + Gin + PostgreSQL + Redis

servers:
  - url: http://localhost:8080/api/v1

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string

    Book:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        author:
          type: string
        isbn:
          type: string
        stock:
          type: integer
        description:
          type: string

    Loan:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        book_id:
          type: integer
        status:
          type: string
          example: borrowed
        borrowed_at:
          type: string
          format: date-time
        returned_at:
          type: string
          format: date-time

paths:

  # =====================
  # AUTH SECTION
  # =====================

  /auth/send-otp:
    post:
      summary: Send OTP for registration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, is_from]
              properties:
                email:
                  type: string
                is_from:
                  type: string
                  example: signup
      responses:
        200:
          description: OTP sent successfully

  /auth/verify-otp:
    post:
      summary: Verify OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, otp]
              properties:
                email:
                  type: string
                otp:
                  type: string
      responses:
        200:
          description: OTP verified

  /auth/register:
    post:
      summary: Register with email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:
                  type: string
                email:
                  type: string
                password:
                  type: string
      responses:
        200:
          description: Registration successful

  /auth/login:
    post:
      summary: Login with email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        200:
          description: Login successful

  # =====================
  # BOOK SECTION
  # =====================

  /books:
    get:
      summary: Get all books
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
      responses:
        200:
          description: List of books
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Book'

    post:
      summary: Create new book
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Book'
      responses:
        200:
          description: Book created

  /books/{id}:
    get:
      summary: Get book by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Book detail

    put:
      summary: Update book
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Book updated

    delete:
      summary: Delete book
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Book deleted

  # =====================
  # LOAN SECTION
  # =====================

  /loans/borrow/{book_id}:
    post:
      summary: Borrow a book
      security:
        - BearerAuth: []
      parameters:
        - name: book_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Book borrowed successfully

  /loans/return/{book_id}:
    post:
      summary: Return a book
      security:
        - BearerAuth: []
      parameters:
        - name: book_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Book returned successfully